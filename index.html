<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  color:#fff;
  background:#000;
  overflow-x:hidden;
}

/* ===== ФОН ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/1pNOWSV.jpeg") center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

/* затемнение */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* контент */
.hero,.section,footer{
  position:relative;
  z-index:2;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

h1::before,h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{color:red;animation:g1 .4s infinite;}
h1::after{color:blue;animation:g2 .4s infinite;}

@keyframes g1{50%{transform:translate(-2px,2px)}}
@keyframes g2{50%{transform:translate(2px,-2px)}}

/* КНОПКА */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch img:hover{
  transform:scale(1.05);
}

/* MERCH BTN */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}

.merch-btn:hover{
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* GLITCH IMAGE */
#glitch-img{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:70%;
  opacity:0;
  z-index:3;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:2;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<img id="glitch-img" src="https://i.imgur.com/1pNOWSV.jpeg">
<div class="flash" id="flash"></div>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
/* звук при клике */
document.body.addEventListener("click",()=>{
  document.getElementById("sound").play();
},{once:true});

/* glitch */
setInterval(()=>{
  let img=document.getElementById("glitch-img");
  let flash=document.getElementById("flash");

  if(Math.random()>0.8){
    img.style.opacity=1;
    flash.style.opacity=0.3;

    setTimeout(()=>{
      img.style.opacity=0;
      flash.style.opacity=0;
    },120);
  }
},2500);
</script>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>
  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is underground chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
