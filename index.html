<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  color:#fff;
  font-family:'Orbitron',sans-serif;
  overflow-x:hidden;
}

/* VIDEO BACKGROUND */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.4) contrast(1.2);
}

/* NOISE */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://imgur.com/zPkKbn6");
  opacity:.12;
  z-index:999;
  pointer-events:none;
}

/* FLASH */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  animation:flash 8s infinite;
}

@keyframes flash{
  0%,96%,100%{opacity:0}
  97%{opacity:0.2}
  98%{opacity:0}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH TEXT */
.glitch{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

.glitch::before,
.glitch::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

.glitch::before{
  color:red;
  animation:glitch1 1s infinite;
}

.glitch::after{
  color:blue;
  animation:glitch2 1s infinite;
}

@keyframes glitch1{
  0%{transform:translate(0)}
  50%{transform:translate(-3px,2px)}
  100%{transform:translate(0)}
}

@keyframes glitch2{
  0%{transform:translate(0)}
  50%{transform:translate(3px,-2px)}
  100%{transform:translate(0)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch img:hover{
  transform:scale(1.05) rotate(1deg);
  filter:contrast(1.5);
}

/* BUTTON GLITCH */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}

.merch-btn:hover{
  animation:glitch1 .2s infinite;
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  color:#fff;
  text-decoration:none;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video class="video-bg" autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-dark-noise-1579/1080p.mp4" type="video/mp4">
</video>

<!-- HERO -->
<section class="hero">
  <h1 class="glitch">PAPA GABBA</h1>

  <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is a project built on underground sound and visual chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">

    <p>PAPA GABBA T-SHIRT</p>
    <p style="opacity:.6;font-size:12px;">LIMITED DROP</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
