<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== INTRO ===== */
.intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}

.intro h1{
  font-size:2rem;
  opacity:0.6;
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  transform:scale(1.2);
  filter:blur(4px) brightness(0.6);
  z-index:0;
  pointer-events:none;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:1;
  pointer-events:none;
}

/* ===== CURSOR ===== */
.cursor{
  position:fixed;
  width:12px;
  height:12px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
  box-shadow:0 0 10px #fff;
}

/* CONTENT */
.hero,.section,footer{
  position:relative;
  z-index:5;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.visible{
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  width:80%;
  max-width:500px;
  transition:.3s;
}

.logo:hover{
  transform:scale(1.05);
  filter:contrast(1.5);
}

/* BUTTONS */
.btn{
  margin-top:20px;
  padding:14px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.3s;
  position:relative;
}

.btn:hover{
  background:#fff;
  color:#000;
  letter-spacing:2px;
}

.secondary-btn{
  opacity:0.7;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:300px;
  margin:0 auto;
  overflow:hidden;
}

.merch img{
  width:100%;
  transition:.4s;
}

.merch:hover img{
  transform:scale(1.1) rotate(1deg);
  filter:contrast(1.3);
}

.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* GLITCH */
#glitch-img{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:60%;
  opacity:0;
  z-index:4;
  pointer-events:none;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:3;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>ENTER</h1>
</div>

<div class="bg"></div>
<div class="overlay"></div>

<div class="cursor" id="cursor"></div>

<img id="glitch-img" src="https://i.imgur.com/zjsLhAJ.png">
<div class="flash" id="flash"></div>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* INTRO */
const intro = document.getElementById("intro");
const sound = document.getElementById("sound");

intro.addEventListener("click",()=>{
  intro.style.opacity=0;
  sound.play();

  setTimeout(()=>{
    intro.style.display="none";
    document.querySelectorAll(".hero, .section, footer").forEach(el=>{
      el.classList.add("visible");
    });
  },500);
});

/* PARALLAX */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*20;
  let y=(e.clientY/window.innerHeight-0.5)*20;
  document.querySelector(".bg").style.transform=`scale(1.2) translate(${x}px,${y}px)`;
});

/* GLITCH */
const glitch = document.getElementById("glitch-img");
const flash = document.getElementById("flash");

setInterval(()=>{
  if(Math.random()>0.8){
    glitch.style.opacity=1;
    flash.style.opacity=0.2;

    setTimeout(()=>{
      glitch.style.opacity=0;
      flash.style.opacity=0;
    },120);
  }
},2500);
</script>

<!-- HERO -->
<section class="hero">
  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn secondary-btn">LINKS</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p>Underground energy. Papa Gabba.</p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer>© 2026 PAPA GABBA</footer>

</body>
</html>
