<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
  cursor:none;
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/1pNOWSV.jpeg") center/cover no-repeat;
  filter:brightness(0.35) contrast(1.3);
  z-index:-3;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(180deg, rgba(0,0,0,0.8), #000);
  z-index:-2;
}

.noise{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.15;
  z-index:-1;
}

/* ===== CURSOR ===== */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border:2px solid #fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH LOGO */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

h1::before,h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{color:red;animation:g1 0.3s infinite;}
h1::after{color:blue;animation:g2 0.3s infinite;}

@keyframes g1{50%{transform:translate(-3px,2px)}}
@keyframes g2{50%{transform:translate(3px,-2px)}}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}
.btn:hover{
  background:#fff;
  color:#000;
  letter-spacing:2px;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
  background:rgba(0,0,0,0.6);
  padding:20px;
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
}

.merch img{
  width:100%;
  transition:.3s;
}
.merch img:hover{
  transform:scale(1.05);
}

.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}
.merch-btn:hover{
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}
.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}
.socials a:hover{
  background:#fff;
  color:#000;
  text-shadow:2px 0 red,-2px 0 blue;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.4;
}

/* GLITCH IMAGE */
#glitch-img{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:80%;
  max-height:80%;
  opacity:0;
  z-index:10;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:9;
}

/* INTRO SCREEN */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  cursor:pointer;
}

#intro h2{
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0;}
}
</style>
</head>

<body>

<div id="intro"><h2>ENTER</h2></div>

<div class="bg"></div>
<div class="overlay"></div>
<div class="noise"></div>

<div class="cursor" id="cursor"></div>

<img id="glitch-img" src="https://i.imgur.com/1pNOWSV.jpeg">
<div class="flash" id="flash"></div>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
/* INTRO */
document.getElementById("intro").onclick = ()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("sound").play();
}

/* CURSOR */
document.addEventListener("mousemove",e=>{
  let c = document.getElementById("cursor");
  c.style.left = e.clientX+"px";
  c.style.top = e.clientY+"px";
});

/* GLITCH */
setInterval(()=>{
  let img = document.getElementById("glitch-img");
  let flash = document.getElementById("flash");

  if(Math.random()>0.75){
    img.style.opacity=1;
    flash.style.opacity=0.3;

    setTimeout(()=>{
      img.style.opacity=0;
      flash.style.opacity=0;
    },100);
  }
},2000);
</script>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>
  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is underground chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
