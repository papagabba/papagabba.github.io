<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ENTER */
#enter{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  cursor:pointer;
  transition:0.6s;
}
#enter h1{
  opacity:.6;
  transition:.3s;
}
#enter:hover h1{
  opacity:1;
  letter-spacing:5px;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  filter:blur(5px) brightness(0.45);
  transform:scale(1.3);
  z-index:0;
  pointer-events:none;
  transition:transform 0.08s;
}
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1;
  pointer-events:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:5;
}

/* LOGO */
.logo-wrap{
  perspective:1000px;
}
.logo{
  width:80%;
  max-width:520px;
  display:block;
  position:relative;
  transition:transform 0.2s ease-out;
  will-change:transform;
}

/* subtle glitch */
.logo.glitch::before,
.logo.glitch::after{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://i.imgur.com/zjsLhAJ.png") center/contain no-repeat;
  opacity:0.25;
  pointer-events:none;
}
.logo.glitch::before{
  filter:hue-rotate(90deg);
  transform:translate(2px,-2px);
}
.logo.glitch::after{
  filter:hue-rotate(-90deg);
  transform:translate(-2px,2px);
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:14px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.2s;
}
.btn:hover{
  background:#fff;
  color:#000;
  letter-spacing:2px;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  position:relative;
  z-index:5;
}

/* MERCH */
.merch{
  max-width:260px;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}
.merch img{
  width:100%;
  display:block;
}

/* BUY hover */
.buy{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  padding:12px 30px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  background:rgba(0,0,0,0.6);
  opacity:0;
  transition:0.3s;
}
.merch:hover .buy{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}
.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}
.socials a:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div id="enter"><h1>ENTER</h1></div>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<script>
/* ENTER */
enter.onclick=()=>{
  enter.style.opacity=0;
  setTimeout(()=>enter.style.display="none",600);
};

/* PARALLAX BG */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*60;
  let y=(e.clientY/window.innerHeight-0.5)*60;
  bg.style.transform=`scale(1.3) translate(${x}px,${y}px)`;
});

/* LOGO PREMIUM + GLITCH */
const logo=document.querySelector(".logo");

let targetX=0,targetY=0,currentX=0,currentY=0;
let lastX=0,lastY=0;

document.addEventListener("mousemove", e=>{
  targetX=(e.clientX/window.innerWidth-0.5)*20;
  targetY=(e.clientY/window.innerHeight-0.5)*20;

  let speed=Math.abs(e.clientX-lastX)+Math.abs(e.clientY-lastY);

  if(speed>40){
    logo.classList.add("glitch");
    setTimeout(()=>logo.classList.remove("glitch"),120);
  }

  lastX=e.clientX;
  lastY=e.clientY;
});

function animate(){
  currentX+=(targetX-currentX)*0.08;
  currentY+=(targetY-currentY)*0.08;

  logo.style.transform=`
    translate(${currentX}px,${currentY}px)
    rotateX(${currentY*-0.5}deg)
    rotateY(${currentX*0.5}deg)
  `;

  requestAnimationFrame(animate);
}
animate();
</script>

<!-- HERO -->
<section class="hero">
  <div class="logo-wrap">
    <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">
  </div>

  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn">LINKS</a>
</section>

<!-- TRACK -->
<section class="section">
  <h2>LATEST TRACK</h2>
  <iframe style="border-radius:12px"
  src="https://open.spotify.com/embed/track/7IzqmNEau3loDdGiLRpwcx"
  width="300" height="80"></iframe>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="buy">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial">Instagram</a>
    <a href="https://open.spotify.com/">Spotify</a>
  </div>
</section>

<footer style="text-align:center;padding:40px 0;opacity:.4;">
© 2026 PAPA GABBA
</footer>

</body>
</html>
