<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ===== BASE ===== */
body{
  font-family:'Orbitron',sans-serif;
  color:#fff;
  background:url("https://i.imgur.com/x6arHGg.jpeg") center/cover no-repeat fixed;
  overflow-x:hidden;
  cursor:none;
}

/* DARK */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  z-index:0;
}

/* NOISE */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.25;
  z-index:1;
}

/* VHS */
.vhs{
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  animation:scan 4s linear infinite;
  z-index:2;
}

@keyframes scan{
  0%{transform:translateY(0)}
  100%{transform:translateY(10px)}
}

/* CURSOR */
.cursor{
  width:12px;
  height:12px;
  background:#fff;
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
}

/* CONTENT */
.hero,.section{
  position:relative;
  z-index:3;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH TEXT */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
  animation:glitchMain 1s infinite;
}

h1::before,h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{color:red;animation:gl1 .2s infinite}
h1::after{color:blue;animation:gl2 .2s infinite}

@keyframes glitchMain{
  50%{transform:skew(-3deg)}
}

@keyframes gl1{
  50%{transform:translate(-4px,2px)}
}

@keyframes gl2{
  50%{transform:translate(4px,-2px)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* MERCH */
.merch img{
  width:100%;
  max-width:400px;
  transition:.2s;
}

.merch img:hover{
  animation:glitchImg .15s infinite;
  filter:contrast(2);
}

@keyframes glitchImg{
  50%{transform:translate(-6px,3px)}
}

/* BUTTON */
.merch-btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

.merch-btn:hover{
  background:#fff;
  color:#000;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:999;
}

/* JUMPSCARE IMAGE */
#scare{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  z-index:998;
}

/* PARALLAX */
.parallax{
  transition:transform 0.1s;
}
</style>
</head>

<body>

<div class="vhs"></div>
<div class="flash" id="flash"></div>
<img id="scare" src="https://i.imgur.com/8Km9tLL.png">

<div class="cursor" id="cursor"></div>

<!-- SOUND -->
<audio id="bg" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="scareSound" src="https://cdn.pixabay.com/audio/2022/10/16/audio_0c8e0d9b53.mp3"></audio>

<script>
/* SOUND */
document.body.addEventListener("click",()=>{
 document.getElementById("bg").play();
},{once:true});

/* CURSOR */
const c = document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
 c.style.left=e.clientX+"px";
 c.style.top=e.clientY+"px";
});

/* PARALLAX */
document.addEventListener("mousemove",e=>{
 document.body.style.backgroundPosition =
  (50+e.clientX/100)+"% "+(50+e.clientY/100)+"%";
});

/* RANDOM FLASH */
setInterval(()=>{
 let f=document.getElementById("flash");
 f.style.opacity=1;
 setTimeout(()=>f.style.opacity=0,100);
},7000);

/* JUMPSCARE */
setInterval(()=>{
 let s=document.getElementById("scare");
 let sound=document.getElementById("scareSound");
 s.style.opacity=1;
 sound.play();
 setTimeout(()=>s.style.opacity=0,200);
},20000);
</script>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>
  <a href="#" class="btn">LISTEN</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Dark. Aggressive. Distorted reality.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <p>PAPA GABBA T-SHIRT</p>
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">BUY</a>
  </div>
</section>

<footer style="text-align:center;padding:40px;opacity:.5;">
© 2026 PAPA GABBA
</footer>

</body>
</html>
