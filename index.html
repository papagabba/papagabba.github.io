<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ENTER */
#enter{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  filter:blur(6px) brightness(0.4);
  transform:scale(1.2);
  z-index:0;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:5;
}

/* LOGO */
.logo-wrap{
  position:relative;
  width:520px;
  max-width:90%;
}

.logo-main{
  width:100%;
  display:block;
}

.logo-glitch{
  position:absolute;
  inset:0;
  background:url("https://i.imgur.com/zjsLhAJ.png") center/contain no-repeat;
  opacity:0;
}

.glitch .g1{
  opacity:0.5;
  transform:translate(3px,-3px);
  filter:hue-rotate(90deg);
}

.glitch .g2{
  opacity:0.5;
  transform:translate(-3px,3px);
  filter:hue-rotate(-90deg);
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px 35px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  position:relative;
  z-index:5;
}

/* MERCH */
.merch{
  max-width:260px;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}

.merch img{
  width:100%;
  display:block;
  transition:0.3s;
}

/* hover эффект */
.merch:hover img{
  transform:scale(1.08);
  filter:contrast(1.3);
}

/* BUY кнопка */
.buy{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  padding:12px 30px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  background:rgba(0,0,0,0.6);
  opacity:0;
  transition:0.3s;
}

.merch:hover .buy{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div id="enter"><h1>ENTER</h1></div>
<div class="bg" id="bg"></div>

<!-- HERO -->
<section class="hero">

  <div class="logo-wrap" id="logoWrap">
    <img src="https://i.imgur.com/zjsLhAJ.png" class="logo-main">
    <div class="logo-glitch g1"></div>
    <div class="logo-glitch g2"></div>
  </div>

  <a href="https://open.spotify.com/artist/0wpnVBR3J3rYbiuyB7FId3?si=qm4zGNLCR1OXjC4Xbjvi_Q" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn">LINKS</a>

</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="buy">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial">Instagram</a>
    <a href="https://open.spotify.com/artist/0wpnVBR3J3rYbiuyB7FId3?si=qm4zGNLCR1OXjC4Xbjvi_Q">Spotify</a>
  </div>
</section>

<script>
window.onload = () => {

  const enter = document.getElementById("enter");
  const bg = document.getElementById("bg");
  const logo = document.getElementById("logoWrap");

  enter.onclick = ()=> enter.style.display="none";

  let tx=0, ty=0, cx=0, cy=0;
  let lastX=0, lastY=0;

  document.addEventListener("mousemove", e=>{

    /* фон */
    let bx=(e.clientX/window.innerWidth-0.5)*40;
    let by=(e.clientY/window.innerHeight-0.5)*40;
    bg.style.transform=`scale(1.2) translate(${bx}px,${by}px)`;

    /* логотип */
    tx=(e.clientX/window.innerWidth-0.5)*15;
    ty=(e.clientY/window.innerHeight-0.5)*15;

    /* glitch */
    let speed=Math.abs(e.clientX-lastX)+Math.abs(e.clientY-lastY);

    if(speed>50){
      logo.classList.add("glitch");
      setTimeout(()=>logo.classList.remove("glitch"),100);
    }

    lastX=e.clientX;
    lastY=e.clientY;
  });

  function loop(){
    cx += (tx-cx)*0.08;
    cy += (ty-cy)*0.08;

    logo.style.transform = `
      translate(${cx}px,${cy}px)
      rotateX(${cy*-0.4}deg)
      rotateY(${cx*0.4}deg)
    `;

    requestAnimationFrame(loop);
  }

  loop();
};
</script>

</body>
</html>
