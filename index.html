<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papa Gabba</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Orbitron', sans-serif;overflow:hidden}

/* INTRO */
#intro{
  position:fixed;
  width:100%;height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}
#intro h1{
  font-size:2rem;
  letter-spacing:5px;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:.2}
  50%{opacity:1}
}

body.loaded{overflow:auto}

/* BG VIDEO */
video.bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.25;
  z-index:-2;
}

.noise{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{
  font-size:5rem;
  letter-spacing:10px;
  animation:glitch .8s infinite;
}
@keyframes glitch{
  0%{text-shadow:3px 0 red,-3px 0 blue}
  50%{text-shadow:-3px 0 red,3px 0 blue}
  100%{text-shadow:3px 0 red,-3px 0 blue}
}

.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}
h2{
  margin-bottom:30px;
  letter-spacing:3px;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

.merch img{
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
  transition:.4s;
}
.merch img:hover{
  transform:scale(1.05);
}

.merch-btn{
  display:block;
  margin-top:15px;
  padding:10px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
}
.merch-btn:hover{
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}
.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}
.socials a:hover{
  background:#fff;
  color:#000;
}

footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" onclick="startSite()">
  <h1>ENTER</h1>
</div>

<!-- VIDEO -->
<video class="bg" autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="noise"></div>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is a project built on underground sound and visual chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://imgur.com/b4epkoi">
    <p style="margin-top:10px;">PAPA GABBA TEE</p>
    <a href="#" class="merch-btn">BUY</a>
  </div>

</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabba" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/artist" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 Papa Gabba
</footer>

<script>
function startSite(){
  document.getElementById('intro').style.display='none';
  document.body.classList.add('loaded');
}
</script>

</body>
</html>
