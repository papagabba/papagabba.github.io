<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  filter:blur(5px) brightness(0.5);
  transform:scale(1.2);
  z-index:0;
  pointer-events:none;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1;
  pointer-events:none;
}

/* CONTENT */
.hero,.section{
  position:relative;
  z-index:5;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* LOGO */
.logo{
  width:80%;
  max-width:500px;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:14px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* PLAYER */
iframe{
  margin-top:20px;
}

/* VISUAL */
.visual{
  margin-top:20px;
}

.visual img{
  width:260px;
  filter:contrast(1.2);
  transition:.3s;
}

.visual img:hover{
  transform:scale(1.05);
}

/* MERCH */
.merch{
  max-width:260px;
  margin:0 auto;
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch:hover img{
  transform:scale(1.05);
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* SMALL FX */
@keyframes breathe{
  0%{filter:brightness(1)}
  50%{filter:brightness(1.05)}
  100%{filter:brightness(1)}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- HERO -->
<section class="hero">
  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn">LINKS</a>
</section>

<!-- TRACK -->
<section class="section">
  <h2>LATEST TRACK</h2>

  <iframe style="border-radius:12px" 
  src="https://open.spotify.com/embed/track/7IzqmNEau3loDdGiLRpwcx" 
  width="300" height="80"></iframe>
</section>

<!-- VISUAL -->
<section class="section">
  <h2>VISUAL</h2>

  <div class="visual">
    <img src="https://i.imgur.com/1pNOWSV.jpeg">
  </div>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="btn">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial">Instagram</a>
    <a href="https://open.spotify.com/">Spotify</a>
  </div>
</section>

<footer style="text-align:center;padding:40px 0;opacity:.4;">
  © 2026 PAPA GABBA
</footer>

</body>
</html>
