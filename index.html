<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  color:#fff;
  background:url("https://i.imgur.com/x6arHGg.jpeg") center/cover no-repeat fixed;
  overflow-x:hidden;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:0;
}

/* NOISE */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.2;
  z-index:1;
  pointer-events:none;
}

/* VHS SCANLINES */
.vhs{
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  animation:scan 6s linear infinite;
  z-index:2;
  pointer-events:none;
}

@keyframes scan{
  0%{transform:translateY(0)}
  100%{transform:translateY(10px)}
}

/* CONTENT */
.hero, .section{
  position:relative;
  z-index:3;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH TEXT */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
  animation:glitchMain 1s infinite;
}

h1::before, h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{
  color:red;
  animation:glitch1 0.3s infinite;
}

h1::after{
  color:blue;
  animation:glitch2 0.3s infinite;
}

@keyframes glitchMain{
  0%,100%{transform:none}
  50%{transform:skew(-2deg)}
}

@keyframes glitch1{
  0%{transform:translate(0)}
  50%{transform:translate(-3px,2px)}
  100%{transform:translate(0)}
}

@keyframes glitch2{
  0%{transform:translate(0)}
  50%{transform:translate(3px,-2px)}
  100%{transform:translate(0)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

.merch img{
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
}

.merch img:hover{
  animation:glitchImg 0.2s infinite;
  filter:contrast(2) brightness(1.3);
}

@keyframes glitchImg{
  0%{transform:translate(0)}
  25%{transform:translate(-5px,3px)}
  50%{transform:translate(5px,-3px)}
  75%{transform:translate(-3px,2px)}
  100%{transform:translate(0)}
}

/* BUTTON MERCH */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.merch-btn:hover{
  animation:glitchBtn 0.15s infinite;
  background:#fff;
  color:#000;
}

@keyframes glitchBtn{
  0%{transform:translate(0)}
  50%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* FLASH EFFECT */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:999;
  pointer-events:none;
  animation:flash 8s infinite;
}

@keyframes flash{
  0%,95%,100%{opacity:0}
  96%{opacity:0.8}
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}
</style>
</head>

<body>

<div class="vhs"></div>
<div class="flash"></div>

<!-- SOUND -->
<audio id="bgSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
document.body.addEventListener("click", ()=>{
  document.getElementById("bgSound").play();
},{once:true});
</script>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is chaos, distortion and raw underground sound.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">

    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <p style="opacity:.6;font-size:12px;">LIMITED DROP</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>

</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
