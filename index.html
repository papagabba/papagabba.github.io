<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  filter:blur(4px) brightness(0.6);
  transform:scale(1.2);
  z-index:0;
  pointer-events:none;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:1;
  pointer-events:none;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:12px;
  height:12px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* CONTENT */
.hero,.section,footer{
  position:relative;
  z-index:5;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  width:80%;
  max-width:500px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:14px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:300px;
  margin:0 auto;
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch:hover img{
  transform:scale(1.05);
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* GALLERY */
.gallery{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.gallery img{
  width:120px;
  transition:.3s;
}

.gallery img:hover{
  transform:scale(1.1);
}

/* SMALL EFFECT */
@keyframes breathe{
  0%{filter:brightness(1)}
  50%{filter:brightness(1.05)}
  100%{filter:brightness(1)}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="cursor" id="cursor"></div>

<script>
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* subtle animation */
setInterval(()=>{
  document.body.style.animation="breathe 4s";
},4000);
</script>

<!-- HERO -->
<section class="hero">
  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn">LINKS</a>
</section>

<!-- PLAYER -->
<section class="section">
  <h2>LATEST TRACK</h2>

  <iframe style="border-radius:12px" 
  src="https://open.spotify.com/embed/track/7IzqmNEau3loDdGiLRpwcx" 
  width="300" height="80"></iframe>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:400px;margin:0 auto;">
    Papa Gabba is underground pressure. Raw sound. Dark visuals.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" class="btn">BUY</a>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>VISUALS</h2>

  <div class="gallery">
    <img src="https://i.imgur.com/1pNOWSV.jpeg">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <img src="https://i.imgur.com/zjsLhAJ.png">
  </div>
</section>

<!-- RELEASES -->
<section class="section">
  <h2>RELEASES</h2>
  <p>Vielleicht Vielleicht</p>
  <p>FIRESTARTER</p>
  <p>CANNONBALL</p>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial">Instagram</a>
    <a href="https://open.spotify.com/">Spotify</a>
  </div>
</section>

<footer>© 2026 PAPA GABBA</footer>

</body>
</html>
