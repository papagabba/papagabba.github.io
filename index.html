<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth;}

body{
  font-family:'Orbitron',sans-serif;
  color:#fff;
  background:#000;
  overflow-x:hidden;
}

/* ===== CINEMATIC BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/zjsLhAJ.png") center/cover no-repeat;
  filter:brightness(0.4) contrast(1.2);
  z-index:-3;
}

/* затемнение */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(180deg, rgba(0,0,0,0.8), #000);
  z-index:-2;
}

/* шум */
.noise{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:.12;
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH LOGO */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

h1::before,h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{
  color:red;
  animation:g1 0.3s infinite;
}
h1::after{
  color:blue;
  animation:g2 0.3s infinite;
}

@keyframes g1{
  50%{transform:translate(-3px,2px)}
}
@keyframes g2{
  50%{transform:translate(3px,-2px)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
  letter-spacing:2px;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH CARD */
.merch{
  max-width:400px;
  margin:0 auto;
  background:rgba(0,0,0,0.6);
  padding:20px;
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  transition:.3s;
}

.merch:hover{
  transform:translateY(-5px);
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch img:hover{
  transform:scale(1.05);
  filter:contrast(1.3);
}

.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.merch-btn:hover{
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.socials a:hover{
  background:#fff;
  color:#000;
  text-shadow:2px 0 red,-2px 0 blue;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.4;
}

/* GLITCH IMAGE */
#glitch-img{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:80%;
  max-height:80%;
  opacity:0;
  z-index:10;
  pointer-events:none;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:9;
}

/* FADE IN */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="noise"></div>

<img id="glitch-img" src="https://i.imgur.com/1pNOWSV.jpeg">
<div class="flash" id="flash"></div>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
/* звук */
document.body.addEventListener("click",()=>{
  document.getElementById("sound").play();
},{once:true});

/* glitch */
setInterval(()=>{
  let img = document.getElementById("glitch-img");
  let flash = document.getElementById("flash");

  if(Math.random()>0.75){
    img.style.opacity=1;
    flash.style.opacity=0.3;

    setTimeout(()=>{
      img.style.opacity=0;
      flash.style.opacity=0;
    },100);
  }
},2000);

/* fade on scroll */
const faders = document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
  faders.forEach(el=>{
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});
</script>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<!-- ABOUT -->
<section class="section fade">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is underground chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section fade">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section fade">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
