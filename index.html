<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  color:#fff;
  overflow-x:hidden;
  background:#000;
}

/* ===== ФОН ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  transform:scale(1.2);
  filter:blur(6px) brightness(0.4);
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HERO */
<section class="hero">

  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">
    LISTEN
  </a>

  <a href="https://link.me/papagabba" target="_blank" class="btn secondary-btn">
    LINKS
  </a>

</section>

/* ===== ЛОГО ===== */
.logo{
  width:80%;
  max-width:500px;
  transition:.3s;
}

.logo:hover{
  transform:scale(1.05);
  filter:contrast(1.5);
}

/* КНОПКА */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  position:relative;
  z-index:2;
}

/* MERCH */
.merch{
  position:relative;
  max-width:350px;
  margin:0 auto;
  overflow:hidden;
}

.merch img{
  width:100%;
  display:block;
  transition:0.4s;
}

.merch::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  opacity:0;
  transition:0.3s;
  pointer-events:none; /* 🔥 фикс */
}

.merch:hover img{
  transform:scale(1.05);
  filter:contrast(1.3);
}

.merch:hover::after{
  opacity:1;
}
.merch-btn{
  position:relative;
  z-index:2;
}
@keyframes glitch{
  0%{transform:translate(0)}
  25%{transform:translate(-1px,1px)}
  50%{transform:translate(1px,-1px)}
  75%{transform:translate(-1px,0)}
  100%{transform:translate(0)}
}
@keyframes glitch{
  0%{transform:translate(0)}
  25%{transform:translate(-2px,2px)}
  50%{transform:translate(2px,-2px)}
  75%{transform:translate(-1px,1px)}
  100%{transform:translate(0)}
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  color:#fff;
  text-decoration:none;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* КУРСОР */
.cursor{
  position:fixed;
  width:14px;
  height:14px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="cursor" id="cursor"></div>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
/* курсор */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* звук */
document.body.addEventListener("click",()=>{
  document.getElementById("sound").play();
},{once:true});
</script>

<!-- HERO -->
<section class="hero">

  <!-- ЛОГО ВМЕСТО ТЕКСТА -->
  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">
    LISTEN
  </a>

</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is underground chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <p>PAPA GABBA T-SHIRT</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/" target="_blank">Spotify</a>
  </div>
</section>

<footer style="padding:40px;text-align:center;opacity:.5;">
  © 2026 PAPA GABBA
</footer>

</body>
</html>
