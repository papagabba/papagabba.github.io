<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== LIVE BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/YnRN8a6.jpeg") center/cover no-repeat;
  transform:scale(1.2);
  filter:blur(4px) brightness(0.6);
  z-index:0;
  pointer-events:none;
  animation:bgPulse 6s infinite;
}

@keyframes bgPulse{
  0%{filter:blur(4px) brightness(0.55)}
  50%{filter:blur(5px) brightness(0.7)}
  100%{filter:blur(4px) brightness(0.55)}
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:1;
  pointer-events:none;
}

/* ===== CURSOR ===== */
.cursor{
  position:fixed;
  width:14px;
  height:14px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* CONTENT */
.hero,.section,footer{
  position:relative;
  z-index:5;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo{
  width:80%;
  max-width:520px;
  transition:.4s;
}

.logo:hover{
  transform:scale(1.05);
  filter:contrast(1.4) brightness(1.2);
}

/* BUTTONS */
.btn{
  margin-top:25px;
  padding:15px 45px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:.3s;
  z-index:10;
}

.btn:hover{
  background:#fff;
  color:#000;
}

.secondary-btn{
  opacity:0.7;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
}

/* MERCH */
.merch{
  max-width:320px;
  margin:0 auto;
}

.merch img{
  width:100%;
  transition:.3s;
}

.merch:hover img{
  transform:scale(1.05);
  filter:contrast(1.3);
}

.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  color:#fff;
  text-decoration:none;
}

/* GLITCH IMAGE */
#glitch-img{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:60%;
  opacity:0;
  z-index:4;
  pointer-events:none;
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:#fff;
  opacity:0;
  z-index:3;
}

/* QR */
.qr-scare img{
  width:150px;
}

/* SCARE */
#scare{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  z-index:999;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(0)}
  25%{transform:translate(-5px,5px)}
  50%{transform:translate(5px,-5px)}
  75%{transform:translate(-5px,2px)}
  100%{transform:translate(0)}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="cursor" id="cursor"></div>

<img id="glitch-img" src="https://i.imgur.com/zjsLhAJ.png">
<div class="flash" id="flash"></div>

<!-- SCARE -->
<img id="scare" src="https://i.imgur.com/zjsLhAJ.png">
<audio id="screamSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c5d1b1c6f.mp3"></audio>

<audio id="sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
/* CURSOR */
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* SOUND */
document.body.addEventListener("click",()=>{
  sound.play();
},{once:true});

/* PARALLAX */
document.addEventListener("mousemove", e=>{
  let x=(e.clientX/window.innerWidth-0.5)*30;
  let y=(e.clientY/window.innerHeight-0.5)*30;
  document.querySelector(".bg").style.transform=`scale(1.2) translate(${x}px,${y}px)`;
});

/* GLITCH */
setInterval(()=>{
  if(Math.random()>0.7){
    glitch-img.style.opacity=1;
    flash.style.opacity=0.2;
    setTimeout(()=>{
      glitch-img.style.opacity=0;
      flash.style.opacity=0;
    },120);
  }
},2000);

/* QR SCREAMER */
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  const ctx=new AudioContext();
  const analyser=ctx.createAnalyser();
  const mic=ctx.createMediaStreamSource(stream);
  mic.connect(analyser);
  const data=new Uint8Array(analyser.frequencyBinCount);

  function loop(){
    analyser.getByteFrequencyData(data);
    let volume=data.reduce((a,b)=>a+b)/data.length;

    if(volume>75){
      scare.style.opacity=1;
      screamSound.play();
      document.body.style.animation="shake 0.2s";

      setTimeout(()=>{
        scare.style.opacity=0;
        document.body.style.animation="none";
      },200);
    }

    requestAnimationFrame(loop);
  }
  loop();
});
</script>

<!-- HERO -->
<section class="hero">
  <img src="https://i.imgur.com/zjsLhAJ.png" class="logo">

  <a href="https://open.spotify.com/" target="_blank" class="btn">LISTEN</a>
  <a href="https://link.me/papagabba" target="_blank" class="btn secondary-btn">LINKS</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p>Underground energy. Papa Gabba.</p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>
  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">
    <a href="https://t.me/nxmxmxlxkxx" class="merch-btn">BUY</a>
  </div>
</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial">Instagram</a>
    <a href="https://open.spotify.com/">Spotify</a>
  </div>
</section>

<!-- QR -->
<section class="section">
  <h2>SCAN</h2>
  <a href="https://link.me/papagabba" class="qr-scare">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://link.me/papagabba">
  </a>
</section>

<footer>© 2026 PAPA GABBA</footer>

</body>
</html>
